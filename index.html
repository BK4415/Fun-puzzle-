<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Wooden Puzzle Master</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#7d4e2d">
    <style>
        :root {
            --wood-light: #e6b382;
            --wood-medium: #b57a4c;
            --wood-dark: #7d4e2d;
            --wood-deep: #4a2d18;
            --accent-green: #8bc34a;
            --accent-blue: #03a9f4;
            --accent-red: #f44336;
            --gold: #ffc107;
            --text-shadow: 2px 2px 0px rgba(0,0,0,0.3);
            --panel-shadow: 0 10px 0px rgba(0,0,0,0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #5d3a1a url('https://www.transparenttextures.com/patterns/wood-pattern.png');
            color: white;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
        }

        /* --- UI Screens --- */
        .screen {
            position: absolute;
            inset: 0;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            padding: 20px;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
        }

        .hidden { transform: translateY(100vh); pointer-events: none; }

        /* --- Header/Background Decoration --- */
        .leaf-decor {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.3), transparent);
            z-index: 1;
            pointer-events: none;
        }

        /* --- Premium Wooden Card --- */
        .wood-panel {
            background: var(--wood-medium);
            border: 8px solid var(--wood-deep);
            border-radius: 25px;
            box-shadow: var(--panel-shadow);
            padding: 20px;
            position: relative;
            margin-top: 20px;
        }

        .wood-panel::before {
            content: '🍃'; position: absolute; top: -15px; right: -10px; font-size: 30px;
        }

        /* --- Title Styling --- */
        .game-title {
            font-size: 42px;
            text-align: center;
            font-weight: 900;
            color: #fff;
            text-shadow: 4px 4px 0 var(--wood-deep), 6px 6px 0 rgba(0,0,0,0.2);
            line-height: 0.9;
            margin: 40px 0;
        }

        /* --- Buttons --- */
        .btn-glossy {
            width: 100%;
            padding: 15px;
            border-radius: 50px;
            border: none;
            border-bottom: 6px solid rgba(0,0,0,0.3);
            font-size: 20px;
            font-weight: bold;
            color: white;
            text-transform: uppercase;
            cursor: pointer;
            transition: transform 0.1s, border-bottom 0.1s;
            margin: 10px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-glossy:active { transform: translateY(4px); border-bottom: 2px solid rgba(0,0,0,0.3); }

        .btn-green { background: linear-gradient(to bottom, #aed581, #689f38); }
        .btn-blue { background: linear-gradient(to bottom, #4fc3f7, #0288d1); }
        .btn-red { background: linear-gradient(to bottom, #ef5350, #c62828); }

        .circle-btn {
            width: 60px; height: 60px; border-radius: 50%;
            background: var(--wood-dark); border: 4px solid var(--wood-deep);
            color: var(--gold); font-size: 24px; box-shadow: 0 4px 0 var(--wood-deep);
        }

        /* --- Puzzle Board --- */
        #board-container {
            width: 100%;
            aspect-ratio: 1;
            background: var(--wood-deep);
            border-radius: 15px;
            padding: 10px;
            display: grid;
            gap: 8px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        .tile {
            background: linear-gradient(145deg, var(--wood-light), var(--wood-medium));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 900;
            color: var(--wood-deep);
            box-shadow: 0 4px 0 var(--wood-dark);
            cursor: pointer;
            user-select: none;
            transition: transform 0.1s;
        }

        .tile.empty { background: transparent; box-shadow: none; }

        /* --- Modals/Popups --- */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0; pointer-events: none;
            transition: 0.3s;
        }

        .modal.active { opacity: 1; pointer-events: auto; }

        .victory-card {
            width: 90%; max-width: 350px;
            background: #fff url('https://www.transparenttextures.com/patterns/old-map.png');
            border: 10px solid var(--wood-medium);
            border-radius: 30px;
            padding: 20px;
            text-align: center;
            color: var(--wood-deep);
        }

        .ribbon {
            background: var(--accent-blue);
            color: white;
            padding: 10px;
            width: 110%;
            margin-left: -5%;
            font-weight: bold;
            box-shadow: 0 4px 0 #01579b;
            clip-path: polygon(10% 0, 90% 0, 100% 50%, 90% 100%, 10% 100%, 0 50%);
            margin-bottom: 20px;
        }

        /* --- Loader --- */
        #loader { background: black; z-index: 1000; justify-content: center; align-items: center; }
    </style>
</head>
<body>

    <div id="loader" class="screen">
        <img src="assets/logo.png" width="120" alt="Logo">
        <h2 style="margin-top: 20px;">LOADING...</h2>
    </div>

    <!-- Home Screen -->
    <main id="home-screen" class="screen">
        <div class="leaf-decor"></div>
        <h1 class="game-title">NUMBER<br>PUZZLE</h1>
        
        <div class="wood-panel">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <span>Difficulty</span>
                <select id="size-select" style="padding: 5px 15px; border-radius: 10px;">
                    <option value="3">3x3 (Easy)</option>
                    <option value="4" selected>4x4 (Normal)</option>
                    <option value="5">5x5 (Hard)</option>
                    <option value="7">7x7 (Master)</option>
                </select>
            </div>
            
            <div id="preview-area" style="height: 120px; background: rgba(0,0,0,0.1); border-radius: 10px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center;">
                <span id="preview-text">CLASSIC MODE</span>
            </div>

            <button id="start-btn" class="btn-glossy btn-green">Play Now</button>
            <button id="resume-btn" class="btn-glossy btn-blue hidden">Resume</button>
        </div>

        <div style="display: flex; justify-content: center; gap: 20px; margin-top: 30px;">
            <button class="circle-btn" onclick="showInfo()">i</button>
            <button class="circle-btn" onclick="showStats()">🏆</button>
        </div>
    </main>

    <!-- Game Screen -->
    <section id="game-screen" class="screen hidden">
        <div class="game-stats" style="display: flex; justify-content: space-between; margin-bottom: 20px;">
            <div class="wood-panel" style="padding: 10px 20px; margin: 0;">⏳ <span id="timer">00:00</span></div>
            <div class="wood-panel" style="padding: 10px 20px; margin: 0;">👟 <span id="moves">0</span></div>
        </div>

        <div id="board-container"></div>

        <div style="display: flex; justify-content: center; gap: 20px; margin-top: 30px;">
            <button class="circle-btn" onclick="exitGame()">🏠</button>
            <button class="circle-btn" onclick="restartGame()">🔄</button>
            <button class="circle-btn" onclick="togglePause()">⏸</button>
        </div>
    </section>

    <!-- Victory Modal -->
    <div id="victory-modal" class="modal">
        <div class="victory-card">
            <div class="ribbon">NEW BEST TIME!</div>
            <div style="font-size: 50px;">🏆</div>
            <h2 id="victory-title">WOW!</h2>
            <div style="margin: 20px 0; font-size: 24px; color: var(--gold);" id="stars">⭐⭐⭐</div>
            <p id="victory-stats">Moves: 45 | Time: 02:30</p>
            <button class="btn-glossy btn-green" onclick="location.reload()">Play Again</button>
            <button class="btn-glossy btn-blue" onclick="exitGame()">Main Menu</button>
        </div>
    </div>

    <script>
        // --- Game Engine ---
        class PuzzleGame {
            constructor() {
                this.size = 4;
                this.grid = [];
                this.moves = 0;
                this.seconds = 0;
                this.timerInterval = null;
                this.emptyPos = { r: 3, c: 3 };
            }

            init(size) {
                this.size = size;
                this.moves = 0;
                this.seconds = 0;
                this.generateSolvedGrid();
                this.shuffle();
                this.startTimer();
            }

            generateSolvedGrid() {
                this.grid = [];
                let count = 1;
                for (let r = 0; r < this.size; r++) {
                    this.grid[r] = [];
                    for (let c = 0; c < this.size; c++) {
                        if (r === this.size - 1 && c === this.size - 1) {
                            this.grid[r][c] = 0;
                            this.emptyPos = { r, c };
                        } else {
                            this.grid[r][c] = count++;
                        }
                    }
                }
            }

            shuffle() {
                let iterations = this.size * this.size * 20;
                for (let i = 0; i < iterations; i++) {
                    const neighbors = this.getNeighbors(this.emptyPos);
                    const move = neighbors[Math.floor(Math.random() * neighbors.length)];
                    this.swap(this.emptyPos, move);
                    this.emptyPos = move;
                }
            }

            getNeighbors(pos) {
                const n = [];
                if (pos.r > 0) n.push({r: pos.r - 1, c: pos.c});
                if (pos.r < this.size - 1) n.push({r: pos.r + 1, c: pos.c});
                if (pos.c > 0) n.push({r: pos.r, c: pos.c - 1});
                if (pos.c < this.size - 1) n.push({r: pos.r, c: pos.c + 1});
                return n;
            }

            swap(p1, p2) {
                [this.grid[p1.r][p1.c], this.grid[p2.r][p2.c]] = [this.grid[p2.r][p2.c], this.grid[p1.r][p1.c]];
            }

            move(r, c) {
                const canMove = (Math.abs(r - this.emptyPos.r) + Math.abs(c - this.emptyPos.c)) === 1;
                if (canMove) {
                    this.swap({r, c}, this.emptyPos);
                    this.emptyPos = {r, c};
                    this.moves++;
                    this.playTick();
                    return true;
                }
                return false;
            }

            checkWin() {
                let count = 1;
                for (let r = 0; r < this.size; r++) {
                    for (let c = 0; c < this.size; c++) {
                        if (r === this.size - 1 && c === this.size - 1) return true;
                        if (this.grid[r][c] !== count++) return false;
                    }
                }
            }

            startTimer() {
                clearInterval(this.timerInterval);
                this.timerInterval = setInterval(() => {
                    this.seconds++;
                    document.getElementById('timer').innerText = this.formatTime(this.seconds);
                }, 1000);
            }

            formatTime(s) {
                return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
            }

            playTick() {
                try {
                    const actx = new (window.AudioContext || window.webkitAudioContext)();
                    const osc = actx.createOscillator();
                    const gain = actx.createGain();
                    osc.connect(gain); gain.connect(actx.destination);
                    osc.frequency.value = 150; gain.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime + 0.1);
                    osc.start(); osc.stop(actx.currentTime + 0.1);
                } catch(e) {}
            }
        }

        // --- UI Logic ---
        const game = new PuzzleGame();
        const screens = { home: document.getElementById('home-screen'), game: document.getElementById('game-screen') };

        window.onload = () => {
            setTimeout(() => document.getElementById('loader').classList.add('hidden'), 1500);
        };

        document.getElementById('start-btn').onclick = () => {
            const size = parseInt(document.getElementById('size-select').value);
            game.init(size);
            renderBoard();
            screens.home.classList.add('hidden');
            screens.game.classList.remove('hidden');
        };

        function renderBoard() {
            const container = document.getElementById('board-container');
            container.style.gridTemplateColumns = `repeat(${game.size}, 1fr)`;
            container.innerHTML = '';
            
            game.grid.forEach((row, r) => {
                row.forEach((val, c) => {
                    const tile = document.createElement('div');
                    tile.className = val === 0 ? 'tile empty' : 'tile';
                    tile.innerText = val === 0 ? '' : val;
                    tile.onclick = () => {
                        if (game.move(r, c)) {
                            document.getElementById('moves').innerText = game.moves;
                            renderBoard();
                            if (game.checkWin()) showVictory();
                        }
                    };
                    container.appendChild(tile);
                });
            });
        }

        function showVictory() {
            clearInterval(game.timerInterval);
            document.getElementById('victory-stats').innerText = `Moves: ${game.moves} | Time: ${game.formatTime(game.seconds)}`;
            document.getElementById('victory-modal').classList.add('active');
        }

        function exitGame() {
            location.reload();
        }

        function restartGame() {
            game.init(game.size);
            renderBoard();
            document.getElementById('moves').innerText = "0";
        }

        // SW Registration
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
